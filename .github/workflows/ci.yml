#turns on github actions anytime there is a push to the repository
name: CI Pipeline
on: [push]

jobs:
  test-and-build:
    #creates the latest ubuntu machine to run the application on
    runs-on: ubuntu-latest
    steps:
      #installs code onto that machine
      - uses: actions/checkout@v4
      #installs python onto machine
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      #install all dependencies from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      #runs tests and provides output
      - name: Run tests
        run: python -m pytest tests/ -v
      #builds docker image
      - name: Build Docker image
        run: docker build -t my-devops-app .
